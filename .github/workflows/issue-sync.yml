name: Issue Triggered Sync

on:
  issues:
    types: [opened]

jobs:
  sync:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'sync') && github.event.issue.state == 'open'

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Docker Environment Setup
      run: |
        # 使用共享的Docker环境设置脚本
        ./scripts/docker-setup.sh

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.0.0

    - name: Extract images from structured issue form
      run: |
        # 从结构化Issue表单中提取镜像列表
        echo "🔍 从Issue中提取镜像列表..."
        echo "Raw issue body:"
        echo "=========================================="
        echo "${{ github.event.issue.body }}"
        echo "=========================================="

        # 创建Python脚本来解析结构化Issue表单
        cat > parse_issue.py << 'EOF'
        import re
        import sys

        def extract_images_from_issue(issue_body):
            """从结构化Issue表单中提取镜像列表"""
            images = []

            # 方法1: 查找代码块中的内容 ```bash 或 ``` ```
            code_block_pattern = r'```(?:bash)?\s*\n(.*?)\n```'
            code_blocks = re.findall(code_block_pattern, issue_body, re.DOTALL)

            for block in code_blocks:
                lines = block.strip().split('\n')
                for line in lines:
                    line = line.strip()
                    if line and not line.startswith('#'):
                        images.append(line)

            # 方法2: 查找 "### 📦 镜像列表" 标题下的内容
            if not images:
                # 匹配以 ### 开头的标题行，后面跟着内容
                # 处理多种可能的标题格式
                patterns = [
                    r'###\s*[📦]?\s*镜像列表\s*\n\n(.*?)(?=\n###|\n--|\Z)',
                    r'###\s*[📦]?\s*镜像列表\s*\n(.*?)(?=\n###|\n--|\Z)',
                    r'###\s*images\s*\n\n(.*?)(?=\n###|\n--|\Z)',
                    r'###\s*images\s*\n(.*?)(?=\n###|\n--|\Z)'
                ]

                for pattern in patterns:
                    matches = re.findall(pattern, issue_body, re.DOTALL | re.MULTILINE)
                    for match in matches:
                        lines = match.strip().split('\n')
                        for line in lines:
                            line = line.strip()
                            # 过滤有效的镜像格式
                            if (line and
                                not line.startswith('#') and
                                not line.startswith('>') and
                                not line.startswith('-') and
                                not line.startswith('*') and
                                not line.startswith('`') and
                                not line.startswith('--')):
                                # 检查是否像镜像名称（包含冒号或斜杠）
                                if (':' in line or '/' in line or
                                    line.startswith('--platform=') or
                                    re.match(r'^[a-zA-Z0-9][a-zA-Z0-9._/-]*$', line)):
                                    images.append(line)

            # 方法3: 如果还没找到，尝试更宽松的匹配
            if not images:
                # 直接查找看起来像镜像的行
                lines = issue_body.split('\n')
                for line in lines:
                    line = line.strip()
                    if (line and
                        not line.startswith('#') and
                        not line.startswith('>') and
                        not line.startswith('-') and
                        not line.startswith('*') and
                        not line.startswith('`') and
                        not line.startswith('###') and
                        not line.startswith('##') and
                        not line.startswith('#') and
                        not line.startswith('**') and
                        not line.startswith('*') and
                        not line.startswith('_') and
                        not line.startswith('---')):

                        # 检查是否像镜像名称
                        if (':' in line or '/' in line or
                            line.startswith('--platform=') or
                            re.match(r'^[a-zA-Z0-9][a-zA-Z0-9._/-]*$', line)):
                            images.append(line)

            return images

        # 读取Issue内容
        issue_body = """${{ github.event.issue.body }}"""

        # 提取镜像列表
        images = extract_images_from_issue(issue_body)

        # 输出结果
        if images:
            print("✅ 成功提取镜像列表:")
            for img in images:
                print(f"  {img}")

            # 保存到文件
            with open('issue_images.txt', 'w') as f:
                for img in images:
                    f.write(f"{img}\n")

            print(f"\n📊 共提取到 {len(images)} 个镜像")
        else:
            print("❌ 未找到有效的镜像列表")
            print("请检查Issue格式，确保镜像列表填写正确")
            sys.exit(1)
        EOF

        # 运行Python脚本
        python3 parse_issue.py

        # 显示提取的镜像
        echo "📋 最终提取到的镜像:"
        cat issue_images.txt | sed 's/^/  > /'

        # 更安全的计数方法
        if [ -s issue_images.txt ]; then
          IMAGE_COUNT=$(wc -l < issue_images.txt | tr -d ' ')
        else
          IMAGE_COUNT=0
        fi

        echo "📊 找到 $IMAGE_COUNT 个镜像"

        # 如果没有找到有效镜像，退出
        if [ "$IMAGE_COUNT" -eq 0 ]; then
          echo "❌ 未在Issue中找到有效的镜像列表"
          echo "请检查Issue格式，每行一个镜像名称"
          exit 1
        fi

        # 设置环境变量供后续步骤使用
        echo "IMAGE_COUNT=$IMAGE_COUNT" >> $GITHUB_ENV

        # 清理临时脚本
        rm -f parse_issue.py

    - name: Docker login and sync using unified processor
      run: |
        set -e

        # 登录阿里云仓库
        docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

        echo "🚀 开始Issue触发的镜像同步..."
        echo "=============================================================================="

        # 将Issue内容转换为JSON配置
        python3 ./scripts/issue_to_json.py issue_images.txt issue_images.json

        # 使用统一处理器进行同步
        ./scripts/unified_sync.py -f -c issue_images.json -o issue-sync-result.env

        # 读取结果并设置环境变量
        if [ -f issue-sync-result.env ]; then
            source issue-sync-result.env
        fi

        # 保存结果用于评论
        echo "TOTAL_COUNT=$TOTAL_COUNT" >> $GITHUB_ENV
        echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_ENV
        echo "FAILED_COUNT=$FAILED_COUNT" >> $GITHUB_ENV

        # 保存成功和失败的镜像列表
        if [ "$SUCCESS_COUNT" -gt 0 ]; then
            echo "SUCCESS_IMAGES=\"$SUCCESS_IMAGES\"" >> $GITHUB_ENV
        else
            echo 'SUCCESS_IMAGES=""' >> $GITHUB_ENV
        fi

        if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "FAILED_IMAGES=\"$FAILED_IMAGES\"" >> $GITHUB_ENV
        else
            echo 'FAILED_IMAGES=""' >> $GITHUB_ENV
        fi

        # 清理临时文件
        rm -f issue_images.txt issue_images.json issue-sync-result.env

    - name: Add final comment
      if: always()
      uses: actions/github-script@v8
      with:
        script: |
          const totalCount = process.env.TOTAL_COUNT || 0;
          const successCount = process.env.SUCCESS_COUNT || 0;
          const skippedCount = parseInt(process.env.SKIPPED_COUNT || 0);
          const failedCount = totalCount - successCount - skippedCount;

          // 获取成功和失败的镜像列表
          const successImages = process.env.SUCCESS_IMAGES || '';
          const failedImages = process.env.FAILED_IMAGES || '';

          let statusEmoji = '✅';
          let statusText = '全部成功';

          if (failedCount > 0) {
            if (successCount === 0 && skippedCount === 0) {
              statusEmoji = '❌';
              statusText = '全部失败';
            } else {
              statusEmoji = '⚠️';
              statusText = '部分成功';
            }
          } else if (skippedCount > 0 && successCount === 0) {
            statusEmoji = '⏭️';
            statusText = '全部已存在';
          }

          const timestamp = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });

          // 构建详细报告
          let detailedReport = '';

          if (successImages.trim()) {
            detailedReport += '\n### ✅ 成功同步的镜像:\n';
            detailedReport += '```\n' + successImages.trim() + '\n```\n';
          }

          if (failedImages.trim()) {
            detailedReport += '\n### ❌ 失败的镜像:\n';
            detailedReport += '```\n' + failedImages.trim() + '\n```\n';
          }

          let statistics = `- 📋 处理总数: ${totalCount} 个镜像\n- ✅ 成功同步: ${successCount} 个镜像\n- ⏭️ 跳过已存在: ${skippedCount} 个镜像\n- ❌ 失败数量: ${failedCount} 个镜像`;

          const commentBody = `## ${statusEmoji} 智能同步完成\n\n**状态**: ${statusText}\n\n📊 **同步统计**:\n${statistics}${detailedReport}\n---\n*由 GitHub Actions 智能处理 • ${timestamp}*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });

          // 如果全部成功或全部已存在，关闭 issue
          if (failedCount === 0 && parseInt(totalCount) > 0) {
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
          }

    env:
      ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
      ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
      ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
      ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
