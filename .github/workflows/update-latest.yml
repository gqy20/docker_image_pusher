name: Update Latest Images

on:
  workflow_dispatch:  # 手动触发
  schedule:
    # 每周一凌晨22点执行（UTC时间），相当于北京时间上午6点
    - cron: '0 22 * * 0'

jobs:
  update-latest:
    name: Update Latest Version Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6.0.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Docker
      uses: docker/setup-buildx-action@v4.0.0

    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Update Images Script
      run: |
        IMAGES_FILE="images.json"
        BACKUP_FILE="images.json.backup"

        echo "🔍 开始检查并更新最新版本的镜像..."
        echo "=============================================================================="

        # 验证JSON格式
        if ! jq empty "$IMAGES_FILE" 2>/dev/null; then
          echo "❌ JSON格式错误"
          exit 1
        fi

        # 创建备份
        cp "$IMAGES_FILE" "$BACKUP_FILE"
        echo "✅ 已创建备份文件: $BACKUP_FILE"

        # 使用jq批量更新所有非latest的tag为latest
        # 保持原有JSON结构，使用walk遍历修改
        jq '
          walk(
            if type == "object" and has("source") and (.source | type == "object") and (.source.tag | type == "string") and .source.tag != "latest" then
              .source.tag = "latest"
            else
              .
            end
          )
        ' "$BACKUP_FILE" > "$IMAGES_FILE" || {
          echo "❌ jq处理失败，恢复备份"
          cp "$BACKUP_FILE" "$IMAGES_FILE"
          exit 1
        }

        # 检查是否有变更
        if diff -q "$BACKUP_FILE" "$IMAGES_FILE" > /dev/null 2>&1; then
          echo "👍 所有镜像版本已是最新，无需更新"
        else
          echo "🎉 发现镜像更新，开始提交更改..."

          # 统计更新的镜像数量
          UPDATED_COUNT=$(jq '
            [.images[] |
            if type == "object" and (.source.tag // "") != "latest" then
              .
            else empty end] | length
          ' "$BACKUP_FILE")

          echo "📦 发现 $UPDATED_COUNT 个镜像需要更新:"
          jq -r '
            [.images[] |
            if type == "object" and (.source.tag // "") != "latest" then
              "  🔄 镜像[\(.id)]: \(.source.repository):\(.source.tag) → \(.source.repository):latest"
            else empty end] | .[] | select(length > 0)
          ' "$BACKUP_FILE" 2>/dev/null || echo "  (无法显示详细信息)"
          echo ""

          # 配置git用户信息
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 添加并提交更改
          git add "$IMAGES_FILE"
          git commit -m "chore: 自动更新latest版本镜像

          - 为已配置镜像统一添加 :latest 标签
          - 保持指定版本的镜像不变
          - 同步更新镜像配置

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: GitHub Action <action@github.com>"

          # 推送更改
          git push

          echo "✅ 更新已成功推送到仓库！"
          echo ""
          echo "📊 变更统计:"
          echo "=============================================================================="
          echo "更新的镜像数量: $UPDATED_COUNT"
          echo "=============================================================================="
        fi

        # 清理备份文件
        rm -f "$BACKUP_FILE"
        echo "🧹 清理完成"

    - name: Trigger Docker Sync
      if: success()
      run: |
        echo "🚀 触发镜像同步流程..."
        echo "镜像同步将在下一个CI/CD流程中自动执行"
