name: Docker

on:
  workflow_dispatch:
    inputs:
      force_sync:
        description: '强制同步所有镜像（忽略现有仓库状态）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [ main ]
    # 移除paths限制，允许任意push触发智能同步检查
  schedule:
    # 每天北京时间上午8点执行智能同步检查
    - cron: '0 0 * * *'


env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    env:
      ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
      ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
      ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
      ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        # 如果空间还是不够用，可以把以下开启，清理出更多空间
        # remove-android: 'true'
        # remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Checkout Code
      uses: actions/checkout@v6.0.2

    - name: Docker Environment Setup
      run: |
        # 使用共享的Docker环境设置脚本
        ./scripts/docker-setup.sh

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.0.0

    - name: Build and push image Aliyun
      run: |
        set -e  # 启用严格模式
        docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

        echo "🔍 统一镜像同步系统启动..."
        echo "=============================================================================="
        echo "📂 命名空间: $ALIYUN_NAME_SPACE"
        echo "=============================================================================="

        # 使用统一同步处理器 - 自动检测配置文件格式
        if [[ "${{ github.event.inputs.force_sync }}" == "true" ]]; then
            echo "⚡ 强制同步模式：同步所有镜像"
            ./scripts/unified_sync.py --force -o sync-result.env
        else
            echo "🔍 智能同步模式：仅同步需要的镜像"
            ./scripts/unified_sync.py --smart -o sync-result.env
        fi

        # 读取并显示结果
        if [ -f sync-result.env ]; then
            source sync-result.env
            echo "📊 同步结果:"
            echo "  📋 处理总数: $TOTAL_COUNT 个镜像"
            echo "  ✅ 同步成功: $SUCCESS_COUNT 个镜像"
            echo "  ❌ 同步失败: $FAILED_COUNT 个镜像"

            # 显示成功和失败的镜像详情
            if [ "$SUCCESS_COUNT" -gt 0 ]; then
                echo "🎉 成功同步的镜像:"
                echo "$SUCCESS_IMAGES" | grep "^✅" || echo "  详情请查看日志"
            fi

            if [ "$FAILED_COUNT" -gt 0 ]; then
                echo "⚠️ 同步失败的镜像:"
                echo "$FAILED_IMAGES" | grep "^❌" || echo "  详情请查看日志"
            fi
        else
            echo "❌ 未找到同步结果文件"
            exit 1
        fi
